<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #0f172a; /* Dark blue background */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.feedback-card {
    background-color: rgba(15, 23, 42, 0.9);
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 50px 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    position: relative;
}
.feedback-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
}

.feedback-card h2 {
    color: #FFD700; /* Yellow header */
    text-align: center;
    margin-bottom: 30px;
    font-weight: 700;
    text-shadow: 1px 1px 6px rgba(0,0,0,0.5);
}

.form-floating input,
.form-floating textarea {
    background-color: rgba(59, 130, 246, 0.1);
    color: #e0f2fe;
    border-radius: 12px;
    border: 1px solid #3b82f6;
    padding: 20px 15px 10px 15px;
    transition: all 0.3s ease;
}

.form-floating input:focus,
.form-floating textarea:focus {
    background-color: rgba(59, 130, 246, 0.2);
    border-color: #60a5fa;
    color: #fff;
}

.form-floating label {
    color: #a5b4fc;
    transition: all 0.3s ease;
}

.form-floating input:focus + label,
.form-floating textarea:focus + label {
    color: #FFD700;
    transform: translateY(-8px) scale(0.9);
}

textarea {
    resize: none;
    min-height: 120px;
}

/* Submit button */
.btn-submit {
    width: 100%;
    padding: 14px 0;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 12px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
}
.btn-submit:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

/* Small floating sparkles */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #FFD700;
    border-radius: 50%;
    opacity: 0;
    animation: sparkleAnim 1.5s infinite;
}
@keyframes sparkleAnim {
    0% {transform: translate(0,0) scale(0); opacity: 0;}
    50% {transform: translate(50px,-50px) scale(1); opacity: 1;}
    100% {transform: translate(0,0) scale(0); opacity: 0;}
}
</style>
</head>
<body>

<div class="feedback-card position-relative">
    <h2>Feedback Form</h2>

    <form method="POST" action="/feedback">
        <div class="form-floating mb-4">
            <input type="text" class="form-control" id="name" name="name" placeholder="Your Name" required>
            <label for="name">Your Name</label>
        </div>

        <div class="form-floating mb-4">
            <input type="email" class="form-control" id="email" name="email" placeholder="Your Email" required>
            <label for="email">Your Email</label>
        </div>

        <div class="form-floating mb-4">
            <textarea class="form-control" id="feedback" name="message" placeholder="Your Feedback" required></textarea>
            <label for="feedback">Your Feedback</label>
        </div>

        <button type="submit" class="btn btn-submit">Submit Feedback</button>
    </form>

    <!-- Sparkles -->
    <div class="sparkle" style="top:10px; left:20px;"></div>
    <div class="sparkle" style="top:50px; left:120px; animation-delay:0.5s;"></div>
    <div class="sparkle" style="top:100px; left:60px; animation-delay:1s;"></div>
    <div class="sparkle" style="top:150px; left:200px; animation-delay:0.7s;"></div>
</div>

</body>
</html>
