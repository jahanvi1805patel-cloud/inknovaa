{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 90vh; background: radial-gradient(circle at top left, #243b6b, #0f172a 60%);">
    <!-- Glassy Login Card -->
    <div class="card shadow-lg p-5" style="
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 28px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    " onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.6)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 30px 80px rgba(0,0,0,0.5)'">

        <h2 class="text-center mb-4" style="
            color: #FFD700;
            font-weight: 700;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        ">Admin Login</h2>

        {% if error %}
        <p class="text-center" style="color:red; font-weight:600;">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label" style="color:white;">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required style="
                    border-radius: 12px;
                    border: 1px solid rgba(255,255,255,0.3);
                    background-color: rgba(255,255,255,0.08);
                    color: white;
                    padding-left: 15px;
                    transition: all 0.3s ease;
                " onfocus="this.style.backgroundColor='rgba(255,255,255,0.12)'; this.style.borderColor='#FFD700'" onblur="this.style.backgroundColor='rgba(255,255,255,0.08)'; this.style.borderColor='rgba(255,255,255,0.3)'">
            </div>

            <div class="mb-3">
                <label class="form-label" style="color:white;">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required style="
                    border-radius: 12px;
                    border: 1px solid rgba(255,255,255,0.3);
                    background-color: rgba(255,255,255,0.08);
                    color: white;
                    padding-left: 15px;
                    transition: all 0.3s ease;
                " onfocus="this.style.backgroundColor='rgba(255,255,255,0.12)'; this.style.borderColor='#FFD700'" onblur="this.style.backgroundColor='rgba(255,255,255,0.08)'; this.style.borderColor='rgba(255,255,255,0.3)'">
            </div>

            <button type="submit" class="btn w-100" style="
                padding: 12px 0;
                font-weight: 600;
                font-size: 1.1rem;
                border-radius: 12px;
                background: linear-gradient(90deg, #f59e0b, #facc15);
                color: white;
                box-shadow: 0 5px 15px rgba(0,0,0,0.4);
                transition: all 0.3s ease;
            " onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 8px 25px rgba(0,0,0,0.5)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 5px 15px rgba(0,0,0,0.4)'">
                Login
            </button>
        </form>

    </div>
</div>

{% endblock %}
