<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}InkStruct AI{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

/* 🌌 GLOBAL BODY THEME */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top left, #243b6b, #0f172a 60%);
    color: white;
}

/* 🔥 NAVBAR */
.navbar {
    background: rgba(15, 23, 42, 0.85) !important;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.navbar-brand {
    font-weight: 700;
    font-size: 22px;
    color: #facc15 !important;   /* 🔥 Yellow */
    letter-spacing: 1px;
    transition: 0.3s ease;
}

.navbar-brand:hover {
    color: #fde047 !important;   /* Lighter yellow on hover */
}
.navbar-nav .nav-link {
    color: #cbd5e1 !important;
    font-weight: 500;
    transition: 0.3s ease;
}

.navbar-nav .nav-link:hover {
    color: #60a5fa !important;
}

/* 🔥 DROPDOWN MENU */
.dropdown-menu {
    background: rgba(30,41,59,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    backdrop-filter: blur(12px);
}

.dropdown-item {
    color: #e2e8f0;
    transition: 0.3s ease;
}

.dropdown-item:hover {
    background: rgba(96,165,250,0.15);
    color: #60a5fa;
}

/* 🔥 GLOBAL BUTTON STYLE */
.btn-primary {
    background: linear-gradient(to right, #2196f3, #2563eb);
    border: none;
}

.btn-primary:hover {
    box-shadow: 0 10px 25px rgba(37,99,235,0.4);
}

/* 🔥 FOOTER */
footer {
    background: transparent;
    color: #94a3b8;
    text-align: center;
    padding: 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">InkNova</a>

    <div class="ms-auto d-flex align-items-center">

      {% if session.get("user_logged_in") %}
        <span class="text-light me-3">
          Welcome, {{ session.get("username") }}
        </span>

        <a href="{{ url_for('upload') }}" class="btn btn-light btn-sm me-2">Upload</a>
      {% else %}
        <a href="{{ url_for('login') }}" class="btn btn-light btn-sm me-2">Login</a>
        <a href="{{ url_for('register') }}" class="btn btn-warning btn-sm me-2">Sign Up</a>
      {% endif %}

      <!-- 🔥 9 DOTS DROPDOWN -->
      <div class="dropdown ms-3">
        <button class="dots-btn"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
          <i class="bi bi-grid-3x3-gap-fill"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-end shadow">
          <li><a class="dropdown-item" href="/history">My History</a></li>
          <li><a class="dropdown-item" href="/about">About Us</a></li>
          <li><a class="dropdown-item" href="/contact">Contact Us</a></li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item text-danger" href="{{ url_for('logout') }}">
              Logout
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
