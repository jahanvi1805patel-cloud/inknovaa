<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#2f3d79,#011948);
background-attachment: fixed;
min-height:100vh;
color:white;
}

.dashboard{
margin-top:80px;
}

.card{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(8px);
border:none;
border-radius:15px;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card:hover{
transform:translateY(-6px);
}

.btn-custom{
width:100%;
margin-top:10px;
border-radius:10px;
font-weight:500;
}

</style>

</head>
<body>

<div class="container dashboard">

<h1 class="text-center mb-5">⚡ Admin Dashboard</h1>

<div class="row text-center justify-content-center">

<div class="col-md-4 mb-4">
<div class="card p-4">
<h3>👥 Users</h3>
<p>Manage registered users</p>

<a href="{{ url_for('manage_users') }}" class="btn btn-primary btn-custom">
Manage Users
</a>

</div>
</div>

<div class="col-md-4 mb-4">
<div class="card p-4">
<h3>👥 Contact</h3>
<p>Manage Contact messages</p>

<a href="{{ url_for('manage_contact') }}" class="btn btn-info btn-custom">View Contact Messages</a>
</a>

</div>
</div>

<div class="col-md-4 mb-4">
<div class="card p-4">
<h3>💬 Feedback</h3>
<p>View user feedback</p>

<a href="{{ url_for('manage_feedback') }}" class="btn btn-warning btn-custom">
Manage Feedback
</a>

</div>
</div>

<div class="col-md-4 mb-4">
<div class="card p-4">
<h3>🏠 Website</h3>
<p>Go to homepage</p>
<a href="/" class="btn btn-success btn-custom">Home</a>
</div>
</div>

<div class="col-md-4 mb-4">
    <div class="card p-4">
        <h3>📁 Users History</h3>
        <p>View uploaded files of all users</p>
        <a href="{{ url_for('admin_history') }}" class="btn btn-danger btn-custom">
            View History
        </a>
    </div>
</div>

</div>

</div>

</body>
</html>
